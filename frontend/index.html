<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoPPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F8FAFC;
            --text-color: #0F172A;
            --ai-bg: #FFFFFF;
            --border-color: #E2E8F0;
            --primary-gradient: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            --button-hover: #4F46E5;
        }

        body { 
            font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Header - Glassmorphism */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        .header .brand {
            font-weight: 700;
            font-size: 22px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .model-badge {
            font-size: 13px;
            color: #475569;
            font-weight: 600;
            background: #F1F5F9;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #E2E8F0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Chat Region */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px 140px 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            scroll-behavior: smooth;
        }
        
        .message-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .message-inner {
            max-width: 800px;
            width: 100%;
            display: flex;
            gap: 16px;
        }
        
        /* AI Message Layout */
        .ai-message {
            align-items: flex-start;
        }
        .avatar.ai {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }
        .avatar.ai svg { width: 22px; height: 22px; fill: white; }
        
        .ai-content {
            background: var(--ai-bg);
            padding: 16px 20px;
            border-radius: 0 20px 20px 20px;
            font-size: 16px;
            line-height: 1.65;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            color: #334155;
            flex: 1;
        }

        /* User Message Layout */
        .user-message {
            justify-content: flex-end;
        }
        .user-content {
            background: var(--primary-gradient);
            color: white;
            padding: 14px 20px;
            border-radius: 20px 20px 0 20px;
            font-size: 16px;
            line-height: 1.6;
            display: inline-block;
            max-width: 75%;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.25);
            font-weight: 500;
        }

        .ai-content p { margin-top: 0; margin-bottom: 12px; }
        .ai-content p:last-child { margin-bottom: 0; }
        .loading { font-style: normal; color: #64748B; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        code { background: #F1F5F9; padding: 3px 8px; border-radius: 6px; font-family: monospace; font-size: 14px; color: #DB2777; font-weight: 600; }
        
        /* Fixed Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(248,250,252,0) 0%, rgba(248,250,252,1) 40%);
            padding: 40px 20px 24px 20px;
            display: flex;
            justify-content: center;
        }
        
        .input-wrapper {
            position: relative;
            background-color: white;
            border-radius: 24px;
            padding: 16px 56px 16px 20px;
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .input-wrapper:focus-within {
            border-color: #A855F7;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.15);
            transform: translateY(-2px);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            resize: none;
            font-size: 16px;
            font-family: inherit;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            outline: none;
            color: var(--text-color);
            box-sizing: border-box;
        }
        textarea::placeholder { color: #94A3B8; font-weight: 500; }

        .send-btn {
            position: absolute;
            right: 14px;
            bottom: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);
        }
        .send-btn:disabled { 
            background: #E2E8F0; 
            color: #94A3B8;
            cursor: not-allowed; 
            box-shadow: none;
        }
        .send-btn:not(:disabled):hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(168, 85, 247, 0.4);
        }
        .send-btn svg { width: 18px; height: 18px; fill: currentColor; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    </style>
</head>
<body>
    <div class="header">
        <div class="brand">DoPPT</div>
        <div class="model-badge">? Llama 3.3 Supercharged</div>
    </div>
    
    <div class="chat-container" id="chat">
        <div class="message-wrapper">
            <div class="message-inner ai-message">
                <div class="avatar ai">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15 9l7 3-7 3-3 7-3-7-7-3 7-3 3-7z"/></svg>
                </div>
                <div class="ai-content">
                    <p><b>Hello there!</b> I am your DoPPT AI Assistant.</p>
                    <p>Simply tell me what topic you need a presentation on, and I will use live DuckDuckGo searches to write and format a beautiful <code>.pptx</code> directly into your workspace.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="promptStr" rows="1" placeholder="Create a beautiful presentation about..."></textarea>
            <button id="genBtn" class="send-btn" disabled>
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const input = document.getElementById("promptStr");
        const btn = document.getElementById("genBtn");
        // If served from FastAPI (recommended), same-origin calls avoid CORS and file:// issues.
        // You can still override with: ?api=http://localhost:8001
        const apiBase = new URLSearchParams(window.location.search).get("api") || "";

        input.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
            if (this.value.trim().length > 0) {
                btn.removeAttribute("disabled");
            } else {
                btn.setAttribute("disabled", "true");
            }
        });

        input.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                if (!btn.disabled) btn.click();
            }
        });

        function addMessage(text, isUser = false) {
            const wrapper = document.createElement("div");
            wrapper.className = "message-wrapper";
            
            const inner = document.createElement("div");
            inner.className = "message-inner " + (isUser ? "user-message" : "ai-message");
            
            if (!isUser) {
                const avatar = document.createElement("div");
                avatar.className = "avatar ai";
                avatar.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15 9l7 3-7 3-3 7-3-7-7-3 7-3 3-7z"/></svg>`;
                inner.appendChild(avatar);
            }
            
            const content = document.createElement("div");
            content.className = isUser ? "user-content" : "ai-content";
            
            let formattedText = text.replace(/\n/g, "<br>")
                                    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
                                    .replace(/`(.*?)`/g, "<code>$1</code>");
            content.innerHTML = formattedText;
            
            inner.appendChild(content);
            wrapper.appendChild(inner);
            chat.appendChild(wrapper);
            
            chat.scrollTop = chat.scrollHeight; 
            return content;
        }

        btn.addEventListener("click", async () => {
            const prompt = input.value.trim();
            if (!prompt) return;
            
            addMessage(prompt, true);
            input.value = "";
            input.style.height = "auto";
            btn.disabled = true;

            const loadingHTML = `<span class="loading">
                <svg width="22" height="22" viewBox="0 0 24 24" style="animation: spin 1.5s linear infinite;"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="url(#gradient)" stroke-width="2.5" stroke-linecap="round"/></svg>
                <svg width="0" height="0"><defs><linearGradient id="gradient"><stop offset="0%" stop-color="#6366F1"/><stop offset="100%" stop-color="#A855F7"/></linearGradient></defs></svg>
                Crafting your slides...
            </span>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>`;
            
            const loadingContent = addMessage(loadingHTML, false);

            try {
                const apiUrl = apiBase ? `${apiBase}/api/generate` : "/api/generate";
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                
                if (data.status === "success") {
                    if (data.message.includes("Finished successfully") || data.message.length < 10) {
                        loadingContent.innerHTML = "? <b>Presentation built successfully!</b> Check your <code>generated_presentations/</code> folder.<br><br><span style='color:#64748B;font-size:14px;'>Logs: " + data.message + "</span>";
                    } else {
                        let text = data.message.replace(/\n/g, "<br>")
                                               .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
                                               .replace(/`(.*?)`/g, "<code>$1</code>");
                        loadingContent.innerHTML = text + "<br><br>? <b>Saved output to generated_presentations/</b>";
                    }
                } else {
                    loadingContent.innerHTML = "?? <b>Error:</b> " + data.message;
                }
            } catch (err) {
                loadingContent.innerHTML = "?? <b>Network Error:</b> Could not connect to FastAPI server. Ensure you ran <code>python -m uvicorn main:app</code>.";
            } finally {
                input.dispatchEvent(new Event("input"));
                chat.scrollTop = chat.scrollHeight;
            }
        });
    </script>
</body>
</html>
